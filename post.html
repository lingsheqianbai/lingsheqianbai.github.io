<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>帖子详情 - 凌社千白</title>
    <!-- 51.LA 统计代码 -->
    <script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
    <script>LA.init({id:"3PEh97IIsQ2zJUR2",ck:"3PEh97IIsQ2zJUR2"})</script>
    <!-- 引入主站样式 -->
    <link rel="stylesheet" href="style/word.css">
    <link rel="stylesheet" href="style/new.css">
    <style>
        /* ===== 完全复刻 Revincx 博客文章样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0A0C10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #e6e6e6;
        }
        /* 背景（与主页一致） */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .pattern-bg {
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(135deg, #0F1115 0px, #0F1115 60px, #14171C 70px, #1A1D24 130px);
        }
        .cube-svg {
            position: absolute;
            width: 200%;
            height: 200%;
            left: -30%;
            top: -20%;
            opacity: 0.6;
            animation: bgDrift 25s linear infinite alternate;
        }
        @keyframes bgDrift {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-15%) scale(1.02); }
        }
        .bg-blur {
            position: fixed;
            inset: 0;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 1;
        }
        /* 文章布局 - 完全模仿 Revincx */
        .layout {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 2rem;
        }
        /* 文章主体 */
        #post {
            min-width: 0;
        }
        .post-content {
            background: rgba(30, 34, 40, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .post-header {
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .post-title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }
        .post-meta {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .article-container {
            padding: 2rem;
            font-size: 1rem;
            line-height: 1.7;
        }
        /* 文章内标题 */
        .article-container h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .article-container h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 1.5rem 0 0.75rem;
        }
        .article-container p {
            margin: 0 0 1rem;
        }
        .article-container ul, .article-container ol {
            margin: 0 0 1rem 1.5rem;
        }
        .article-container li {
            margin: 0.4rem 0;
        }
        .article-container blockquote {
            margin: 1rem 0;
            padding: 0.5rem 0 0.5rem 1rem;
            border-left: 4px solid rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.2);
            border-radius: 0 8px 8px 0;
            color: rgba(255,255,255,0.7);
        }
        .article-container pre {
            background: rgba(0,0,0,0.5);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'SF Mono', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        .article-container code {
            background: rgba(0,0,0,0.4);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .article-container pre code {
            background: none;
            padding: 0;
        }
        .article-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5rem 0;
        }
        .article-container a {
            color: #3B82F6;
            text-decoration: none;
        }
        .article-container a:hover {
            text-decoration: underline;
        }
        /* 文章底部 */
        .post-copyright {
            padding: 1.5rem 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }
        .post-copyright a {
            color: #3B82F6;
        }
        .post-tags {
            padding: 0 2rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .post-tag {
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }
        .post-nav {
            padding: 0 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .post-nav a {
            color: #3B82F6;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .post-nav a:hover {
            text-decoration: underline;
        }
        /* 评论区域 */
        .comment-wrap {
            padding: 1.5rem 2rem 2rem;
        }
        #twikoo-wrap {
            margin-top: 0;
        }
        /* 右侧目录 */
        .aside-content {
            position: sticky;
            top: 2rem;
            align-self: start;
        }
        .card-widget {
            background: rgba(30, 34, 40, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem;
        }
        .item-headline {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toc-content {
            max-height: 70vh;
            overflow-y: auto;
        }
        .toc {
            list-style: none;
            padding-left: 0;
        }
        .toc-item {
            margin: 0.5rem 0;
        }
        .toc-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.85rem;
            display: block;
            transition: color 0.2s;
        }
        .toc-link:hover {
            color: #3B82F6;
        }
        .toc-level-2 {
            padding-left: 0;
        }
        .toc-level-3 {
            padding-left: 1rem;
        }
        /* 响应式 */
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .aside-content {
                display: none;
            }
        }
        @media (max-width: 640px) {
            .post-header {
                padding: 1.5rem;
            }
            .article-container {
                padding: 1.5rem;
            }
            .post-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="pattern-bg">
            <svg class="cube-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="cube" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
                        <path d="M30 0 L60 15 L60 41 L30 52 L0 41 L0 15 Z" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
                        <path d="M30 26 L60 15 M30 26 L0 15 M30 26 L30 52" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#cube)"/>
            </svg>
        </div>
    </div>
    <div class="bg-blur"></div>

    <div class="layout">
        <div id="post">
            <div class="post-content">
                <div class="post-header">
                    <h1 class="post-title" id="postTitle">加载中...</h1>
                    <div class="post-meta" id="postMeta"></div>
                </div>
                <div class="article-container" id="articleContainer">
                    <p>加载中...</p>
                </div>
                <div class="post-copyright" id="postCopyright">
                    <span>文章作者: 凌社千白</span><br>
                    <span id="postLinkSpan">文章链接: <a id="postLink" href="#">加载中</a></span><br>
                    <span>版权声明: 本作品采用 <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a> 许可协议。转载请注明出处。</span>
                </div>
                <div class="post-tags" id="postTags"></div>
                <div class="post-nav" id="postNav">
                    <span id="prevLink">上一篇：无</span>
                    <span id="nextLink">下一篇：无</span>
                </div>
                <div class="comment-wrap">
                    <div id="twikoo-wrap"></div>
                    <script src="https://cdn.jsdelivr.net/npm/twikoo/dist/twikoo.all.min.js"></script>
                    <script>
                        // 可选：初始化 Twikoo，若不需要评论可删除此段
                        if (typeof twikoo !== 'undefined') {
                            twikoo.init({
                                el: '#twikoo-wrap',
                                envId: '你的环境ID', // 替换为你的环境 ID
                                region: ''
                            });
                        }
                    </script>
                </div>
            </div>
        </div>
        <div class="aside-content">
            <div class="card-widget">
                <div class="item-headline">
                    <i class="fas fa-stream"></i>
                    <span>目录</span>
                </div>
                <div class="toc-content">
                    <ul class="toc" id="tocList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取 URL 参数
        function getPostId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // 计算阅读时长（中文约 200 字/分钟）
        function calcReadingTime(html) {
            const text = html.replace(/<[^>]*>/g, '');
            const minutes = Math.ceil(text.length / 200);
            return minutes;
        }

        // 生成目录
        function generateTOC() {
            const container = document.getElementById('articleContainer');
            const headings = container.querySelectorAll('h2, h3');
            const tocList = document.getElementById('tocList');
            if (!tocList) return;
            tocList.innerHTML = '';
            headings.forEach(heading => {
                const level = heading.tagName.toLowerCase();
                const text = heading.textContent;
                // 为每个标题生成唯一 ID
                const id = `heading-${Date.now()}-${Math.random().toString(36).substr(2, 8)}`;
                heading.id = id;
                const li = document.createElement('li');
                li.className = `toc-item toc-level-${level}`;
                const a = document.createElement('a');
                a.className = 'toc-link';
                a.href = `#${id}`;
                a.textContent = text;
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth' });
                });
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // 加载所有帖子（用于上一篇/下一篇）
        let allPosts = [];

        async function loadAllPosts() {
            try {
                const response = await fetch('data/posts.json');
                if (!response.ok) throw new Error('加载失败');
                allPosts = await response.json();
                allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
            } catch (e) {
                console.error('加载全部帖子失败', e);
            }
        }

        // 加载当前帖子
        async function loadPost() {
            const id = getPostId();
            if (!id) {
                // 无 ID 参数，显示默认提示
                document.getElementById('postTitle').textContent = '未指定帖子';
                document.getElementById('articleContainer').innerHTML = '<p>请从首页点击帖子进入。</p>';
                return;
            }

            await loadAllPosts();

            try {
                const response = await fetch('data/posts.json');
                if (!response.ok) throw new Error('网络响应失败');
                const posts = await response.json();
                const post = posts.find(p => p.id == id);
                if (!post) {
                    document.getElementById('postTitle').textContent = '未找到该帖子';
                    document.getElementById('articleContainer').innerHTML = '<p>帖子不存在或已被删除。</p>';
                    return;
                }

                // 更新标题和元数据
                document.getElementById('postTitle').textContent = post.title;
                const readingTime = calcReadingTime(post.content);
                const wordCount = post.content.replace(/<[^>]*>/g, '').length;
                document.getElementById('postMeta').innerHTML = `
                    <span>📅 发布时间：${post.date}</span>
                    <span>📖 总字数：${wordCount}</span>
                    <span>⏱️ 阅读时长：约 ${readingTime} 分钟</span>
                `;
                document.getElementById('articleContainer').innerHTML = post.content;
                document.getElementById('postLink').href = window.location.href;
                document.getElementById('postLink').textContent = window.location.href;

                // 处理标签
                if (post.tags && post.tags.length) {
                    const tagsHtml = post.tags.map(tag => `<span class="post-tag">${tag}</span>`).join('');
                    document.getElementById('postTags').innerHTML = tagsHtml;
                } else {
                    document.getElementById('postTags').innerHTML = '';
                }

                // 处理上一篇/下一篇
                const currentIndex = allPosts.findIndex(p => p.id == id);
                let prevPost = null, nextPost = null;
                if (currentIndex !== -1) {
                    if (currentIndex > 0) prevPost = allPosts[currentIndex - 1];
                    if (currentIndex < allPosts.length - 1) nextPost = allPosts[currentIndex + 1];
                }
                const prevHtml = prevPost ? `<a href="post.html?id=${prevPost.id}">上一篇：${prevPost.title}</a>` : '上一篇：无';
                const nextHtml = nextPost ? `<a href="post.html?id=${nextPost.id}">下一篇：${nextPost.title}</a>` : '下一篇：无';
                document.getElementById('prevLink').innerHTML = prevHtml;
                document.getElementById('nextLink').innerHTML = nextHtml;

                // 生成目录
                generateTOC();

                // 更新页面标题
                document.title = `${post.title} - 凌社千白`;
            } catch (error) {
                console.error('加载失败', error);
                document.getElementById('postTitle').textContent = '加载失败';
                document.getElementById('articleContainer').innerHTML = '<p>数据加载失败，请稍后重试。</p>';
            }
        }

        loadPost();
    </script>
</body>
</html>
